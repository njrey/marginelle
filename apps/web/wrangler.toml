name = "websocket-server"
main = "./src/cf-worker/index.ts"
compatibility_date = "2025-05-08"
compatibility_flags = ["nodejs_compat"]

# TODO: Add your Cloudflare account ID here
# Find it in Cloudflare Dashboard > Overview (right sidebar)
account_id = "3f7282dd7e726f4414b70698b0b4fd5b"

# DO class version history (see CLEAR_STORAGE.md for nuclear reset procedure):
#   v1 — WebSocketServer   (original)
#   v2 — WebSocketServerV2 (renamed from v1, March 2026)
#   v3 — WebSocketServerV3 (renamed from v2, March 2026 — first stable sync)
# To do a nuclear reset: add a v4 migration renaming V3→V4, update binding +
# class name in index.ts, deploy, then follow CLEAR_STORAGE.md § Nuclear Reset.

[[durable_objects.bindings]]
name = "WEBSOCKET_SERVER"
class_name = "WebSocketServerV3"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["WebSocketServer"]

[[migrations]]
tag = "v2"
renamed_classes = [{from = "WebSocketServer", to = "WebSocketServerV2"}]

[[migrations]]
tag = "v3"
renamed_classes = [{from = "WebSocketServerV2", to = "WebSocketServerV3"}]

[[d1_databases]]
binding = "DB"
database_name = "marginelle-sync"
database_id = "16c74e8c-230d-474e-96f6-20b7c04962f5"

#[[d1_databases]]
#binding = "DB"
#database_name = "livestore-sync-cf-demo"
#database_id = "1c9b5dae-f1fa-49d8-83fa-7bd5b39c4121"
# database_id = "${LIVESTORE_CF_SYNC_DATABASE_ID}"

[vars]
APP_ORIGIN = "https://marginelle.pages.dev"
# Secrets — set these via: wrangler secret put <NAME>
# BETTER_AUTH_SECRET = "..."   (min 32 chars, high entropy)
# ADMIN_SECRET = "..."         (used by LiveStore sync-cf internally)

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
